name: enwik9 two-system head to head mix vs omega-expand

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/enwik9-two-system.yml'

permissions:
  contents: read

jobs:
  pin-e9:
    name: pin-enwik9-1GB
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Fetch and verify enwik9
        run: |
          set -euo pipefail
          ok=0
          for url in https://mattmahoney.net/dc/enwik9.zip http://mattmahoney.net/dc/enwik9.zip ; do
            if curl -fL --retry 4 --retry-all-errors --connect-timeout 20 -A 'asolaria/1.0' -o e9.zip "$url"; then ok=1; break; fi
          done
          test "$ok" -eq 1
          unzip -o e9.zip >/dev/null
          test "$(wc -c < enwik9)" -eq 1000000000
          sha256sum enwik9 | tee enwik9.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: pinned-enwik9
          path: enwik9
          if-no-files-found: error
          retention-days: 1

  system:
    name: e9-${{ matrix.sys }}
    needs: pin-e9
    strategy:
      fail-fast: false
      matrix:
        include:
          - sys: mix
            path: hutter/variants/mix/hp_mix.rs
            args: ""
          - sys: expand-d40
            path: hutter/expand/hp_omega_expand.rs
            args: "--dirs 40"
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: pinned-enwik9
          path: .
      - name: Verify enwik9
        run: test "$(wc -c < enwik9)" -eq 1000000000
      - name: Compile
        run: rustc --edition=2021 -O "${{ matrix.path }}" -o hp
      - name: Compress decompress verify measure at 1GB
        run: |
          set -e
          SYS='${{ matrix.sys }}'
          a=$(sha256sum enwik9 | cut -d' ' -f1)
          /usr/bin/time -v ./hp compress enwik9 out.hp ${{ matrix.args }} 2> t.log | tee log
          ./hp decompress out.hp out.rt | tee -a log
          b=$(sha256sum out.rt | cut -d' ' -f1)
          if [ "$a" != "$b" ]; then echo "ROUNDTRIP_FAIL_$SYS"; exit 1; fi
          arch=$(wc -c < out.hp)
          dec=$(wc -c < "${{ matrix.path }}")
          bpc=$(python3 -c "print(f'{$arch*8/1e9:.4f}')")
          secs=$(grep -m1 'wall clock' t.log | grep -oE '[0-9:.]+$' || echo NA)
          {
            echo "ENWIK9SYS|system=$SYS|corpus=enwik9_1GB|lane=cloud_gitram|seat=8467a937cba309f7|json=0"
            echo "MEASURE|input_bytes=1000000000|archive_bytes=$arch|decoder_src_bytes=$dec|total_bytes=$((arch+dec))|bpc=$bpc|roundtrip_exact=1|encode_wall=$secs|json=0"
            echo "SHA|enwik9_sha256=$a|restored_sha256=$b|match=1|json=0"
            echo "LABEL|enwik9_record_approx=110000000|score=archive_plus_decoder|archive_ratio=NOT_CLAIMED|claims_final_apex=0|json=0"
          } > "RESULT-e9-$SYS.hbp"
          sha256sum "RESULT-e9-$SYS.hbp" | tee "RESULT-e9-$SYS.hbp.sha256"
          cat "RESULT-e9-$SYS.hbp"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e9-${{ matrix.sys }}
          path: |
            RESULT-e9-${{ matrix.sys }}.hbp
            RESULT-e9-${{ matrix.sys }}.hbp.sha256
            log
          if-no-files-found: warn
